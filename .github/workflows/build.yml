name: Build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: AspireMC-Updater-linux
          - os: windows-latest
            artifact: AspireMC-Updater.exe
          - os: macos-latest
            artifact: AspireMC-Updater-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install tkinter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Build
        run: python build.py

      - name: Rename binary (non-Windows)
        if: runner.os != 'Windows'
        run: mv dist/AspireMC-Updater dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ runner.os }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get app version
        id: appver
        run: |
          VERSION=$(python3 -c "import re; m=re.search(r'APP_VERSION\s*=\s*[\"\']([\d.]+)', open('gui.py').read()); print(m.group(1))")
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}-dev', steps.appver.outputs.value) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0} (latest build)', steps.appver.outputs.value) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: dist/*
